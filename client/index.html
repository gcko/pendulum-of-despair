<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pendulum of Despair</title>

  <!-- Pixel font from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />

  <!-- Phaser 3 (pinned to a stable release) -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <style>
    /* ── Reset & dark base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000011;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }

    /* ── Game canvas wrapper ──────────────────────────────────────────────── */
    #game-container {
      position: relative;
      /* Phaser's Scale Manager handles sizing; we just provide a container */
    }

    #game-container canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── Loading screen (hidden once Phaser starts) ───────────────────────── */
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000022; color: #4488ff;
      font-size: 10px; gap: 16px;
      z-index: 200;
      transition: opacity 0.5s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    /* ── Auth overlay (created by TitleScene.js via DOM) ─────────────────── */
    /* Styles are applied inline by TitleScene for self-containment */
  </style>
</head>

<body>
  <!-- Loading indicator shown until Phaser/BootScene is ready -->
  <div id="loading-screen">
    <div style="font-size:18px;color:#aaccff;letter-spacing:4px">PENDULUM OF DESPAIR</div>
    <div id="loading-msg">Loading...</div>
  </div>

  <!-- Phaser renders into this container -->
  <div id="game-container"></div>

  <!--
    ES module entry point.
    Phaser 3 is loaded as a global (window.Phaser) via the CDN script above,
    so our ES modules can reference it without a bundler.
  -->
  <script type="module" src="src/main.js"></script>

  <script>
    // Hide the loading screen once Phaser fires its first READY event
    document.addEventListener('DOMContentLoaded', () => {
      // Phaser boots asynchronously; poll for canvas creation
      const interval = setInterval(() => {
        const canvas = document.querySelector('#game-container canvas');
        if (canvas) {
          clearInterval(interval);
          const screen = document.getElementById('loading-screen');
          if (screen) screen.classList.add('hidden');
        }
      }, 200);
    });
  </script>
</body>
</html>
