name: Coverage Gap Analysis

on:
  workflow_dispatch: {}
  schedule:
    # Every Monday at 9am UTC
    - cron: '0 9 * * 1'

jobs:
  coverage-gap-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      # ========== SETUP ==========
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm run build:shared

      # ========== COLLECT COVERAGE ==========
      - name: Run server tests with coverage
        id: server-coverage
        continue-on-error: true
        run: pnpm --filter @pendulum/server test -- --coverage

      - name: Run client tests with coverage
        id: client-coverage
        continue-on-error: true
        run: pnpm --filter @pendulum/client test -- --coverage

      # ========== GENERATE REPORT ==========
      - name: Generate coverage gap analysis report
        id: report
        run: |
          GENERATED_AT=$(date -u +"%Y-%m-%d %H:%M UTC")
          cat > coverage-gap-report.md << EOF
          # Coverage Gap Analysis Report

          Generated: ${GENERATED_AT}

          ## Server Package (@pendulum/server)
          EOF

          if [ -f packages/server/coverage/coverage-final.json ]; then
            echo "Coverage data collected successfully." >> coverage-gap-report.md
          else
            echo "No coverage data available." >> coverage-gap-report.md
          fi

          cat >> coverage-gap-report.md << 'EOF'

          ## Client Package (@pendulum/client)
          EOF

          if [ -f packages/client/coverage/coverage-final.json ]; then
            echo "Coverage data collected successfully." >> coverage-gap-report.md
          else
            echo "No coverage data available." >> coverage-gap-report.md
          fi

      # ========== CREATE/UPDATE ISSUE ==========
      - name: Create or update GitHub issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_TITLE="Coverage Gap Analysis Report"

          EXISTING_ISSUE=$(gh issue list \
            --state open \
            --search "\"${ISSUE_TITLE}\" in:title" \
            --json number,title \
            --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
            | head -1)

          if [ -n "$EXISTING_ISSUE" ]; then
            echo "Updating existing issue #${EXISTING_ISSUE}"
            gh issue edit "$EXISTING_ISSUE" --body-file coverage-gap-report.md
          else
            echo "Creating new issue"
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body-file coverage-gap-report.md \
              --label "testing"
          fi
