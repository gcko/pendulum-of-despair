name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '/re-review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_PR_REVIEW }}

          additional_permissions: |
            actions: read

          prompt: |
            You are responding to an @claude mention on this repository.
            Follow AGENTS.md for universal agent guidance and CLAUDE.md for Claude-specific guidance.

            **Review context awareness:**
            If this is a PR, check for existing claude[bot] review comments:
            `gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number || github.event.pull_request.number }}/comments --jq '[.[] | select(.user.login == "claude[bot]")] | last | .body // empty'`

            If a prior review exists, use it as context when answering questions about the PR.
            You can reference specific findings from the review in your responses.

            **IMPORTANT boundaries:**
            - Do NOT submit formal GitHub reviews (approve/request-changes) — that is the review workflow's job
            - Do NOT modify any files
            - If the user wants a full re-review, direct them to comment `/re-review` on the PR
            - You CAN discuss findings, explain rationale, and answer questions about the code

            **Project context:**
            - TypeScript pnpm workspace monorepo (packages/shared, packages/server, packages/client)
            - Server: Express 5 + node:sqlite (Node 24+)
            - Client: Phaser 3 + Vite 7
            - Strict TypeScript, no `any` types
          claude_args: '--allowed-tools "Bash(gh:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(grep:*),Bash(find:*),Bash(ls:*),Bash(stat:*),Bash(wc:*),Bash(diff:*),Read,Glob,Grep"'
